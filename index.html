<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador PUCESA</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0066cc; margin-top: 0; }
        .info { color: #666; font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; color: #222; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #f1f3f5; border: 2px solid #e9ecef; padding: 14px; border-radius: 8px; text-align: left; font-size: 1rem; cursor: pointer; display: block; width: 100%; box-sizing: border-box; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .next { margin-top: 20px; width: 100%; background: #0066cc; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; display: none; cursor: pointer; }
        #loading { text-align: center; font-size: 1.2rem; color: #0066cc; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Simulador PUCESA</h2>
    <div id="loading">Cargando el banco de preguntas masivo...</div>
    <div id="quiz" style="display:none;">
        <div class="info" id="info"></div>
        <div class="question" id="qtext"></div>
        <div class="options" id="opts"></div>
        <button class="next" id="next" onclick="nextQ()">Siguiente Pregunta</button>
    </div>
    <div id="result" style="display:none; text-align:center;">
        <h3>¡Simulación Completada!</h3>
        <p id="score" style="font-size:1.5rem; color: #0066cc; font-weight: bold;"></p>
        <button class="btn" style="background:#0066cc; color:white; text-align:center;" onclick="restart()">Reiniciar</button>
    </div>
</div>

<script>
    let questions = [];
    let idx = 0, score = 0, ans = false;

    // Conexión segura a la nube para descargar tus preguntas sin saturar tu celular
    async function loadOnlineQuestions() {
        try {
            const response = await fetch('https://jsonsilo.com');
            const data = await response.json();
            questions = data.questions;
            document.getElementById("loading").style.display = "none";
            document.getElementById("quiz").style.display = "block";
            loadQ();
        } catch (error) {
            document.getElementById("loading").innerText = "Error al conectar con la base de datos. Reintenta en un momento.";
        }
    }

    function loadQ() {
        ans = false;
        document.getElementById("next").style.display = "none";
        const q = questions[idx];
        document.getElementById("info").innerText = "Pregunta " + (idx + 1) + " de " + questions.length;
        document.getElementById("qtext").innerText = q.q;
        const box = document.getElementById("opts");
        box.innerHTML = "";
        
        q.o.forEach((textoOp, i) => {
            const b = document.createElement("button");
            b.className = "btn";
            b.innerText = textoOp;
            b.onclick = function() {
                if (ans) return;
                ans = true;
                if (i === q.a) { 
                    b.classList.add("correct"); 
                    score++; 
                } else { 
                    b.classList.add("incorrect"); 
                    box.children[q.a].classList.add("correct"); 
                }
                document.getElementById("next").style.display = "block";
            };
            box.appendChild(b);
        });
    }

    function nextQ() {
        idx++;
        if (idx < questions.length) loadQ();
        else {
            document.getElementById("quiz").style.display = "none";
            document.getElementById("result").style.display = "block";
            document.getElementById("score").innerText = "Puntaje: " + score + " / " + questions.length;
        }
    }

    function restart() { 
        idx = 0; 
        score = 0; 
        document.getElementById("result").style.display = "none"; 
        document.getElementById("quiz").style.display = "block"; 
        loadQ(); 
    }
    
    loadOnlineQuestions();
</script>
</body>
</html>
