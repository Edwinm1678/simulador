<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUCESA</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0066cc; margin-top: 0; }
        .info { color: #666; font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; color: #222; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #f1f3f5; border: 2px solid #e9ecef; padding: 14px; border-radius: 8px; text-align: left; font-size: 1rem; cursor: pointer; display: block; width: 100%; box-sizing: border-box; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .next { margin-top: 20px; width: 100%; background: #0066cc; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Simulador PUCESA</h2>
    <div id="quiz">
        <div class="info" id="info"></div>
        <div class="question" id="qtext"></div>
        <div class="options" id="opts"></div>
        <button class="next" id="next" onclick="nextQ()">Siguiente Pregunta</button>
    </div>
    <div id="result" style="display:none; text-align:center;">
        <h3>¡Completado!</h3>
        <p id="score" style="font-size:1.5rem; color: #0066cc; font-weight: bold;"></p>
        <button class="btn" style="background:#0066cc; color:white; text-align:center;" onclick="restart()">Reiniciar</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. ¿Cuál describe los valores normales del recién nacido a término?", o: ["Peso: 2500-3500g; Talla: 48-52cm; PC: 33-35cm", "Peso: 1800-2400g; Talla: 45-47cm; PC: 30-32cm", "Peso: 2500-4000g; Talla: 54-58cm; PC: 36-38cm", "Peso: 3000-4500g; Talla: 50-55cm; PC: 35-37cm"], a: 0 },
        { q: "2. ¿Cuáles son los puntos de alineación para medir la talla a un niño de 4 años?", o: ["Occipucio, hombros, glúteos, pantorrillas y talones", "Frente, hombros, región lumbar, rodillas y pies", "Occipucio, escápulas, región lumbar, rodillas y talones", "Cabeza, cuello, columna torácica, glúteos y rodillas"], a: 0 },
        { q: "3. ¿Hasta qué edad se valora el perímetro cefálico (PC) y cuánto incrementa en el primer trimestre?", o: ["Hasta los 2 años; crece 2 cm/mes", "Hasta los 5 años; crece 1 cm/mes", "Hasta los 3 años; crece 3 cm/mes", "Hasta los 4 años; crece 0.5 cm/mes"], a: 0 },
        { q: "4. ¿Qué precauciones se deben tener con los instrumentos antropométricos pediátricos?", o: ["Calibrar balanza, verificar cinta, tallímetro fijo y nivelado", "Usar balanza sin calibrar, doblar cinta, inclinar tallímetro", "Calibrar mensualmente, usar cualquier cinta, ajustar a mano", "Usar balanza digital sin verificar, usar cinta elástica"], a: 0 },
        { q: "5. ¿A qué edad se cambia la técnica de medición de longitud (acostado) a estatura (de pie)?", o: ["A los 2 años", "A los 18 meses", "A los 3 años", "A los 4 años"], a: 0 },
        { q: "6. ¿Cuál es el indicador antropométrico que determina la desnutrición crónica infantil?", o: ["Talla para la edad (T/E) por debajo de -2 DE", "Peso para la talla (P/T) por debajo de -2 DE", "IMC para la edad por debajo de -2 DE", "Peso para la edad (P/E) por debajo de -2 DE"], a: 0 },
        { q: "7. Un paciente pesa 90 kg y mide 1.78 m. ¿Cuál es su IMC y clasificación?", o: ["IMC: 28.4 — Sobrepeso", "IMC: 30.2 — Obesidad grado I", "IMC: 26.1 — Sobrepeso leve", "IMC: 31.5 — Obesidad grado II"], a: 0 },
        { q: "8. ¿Cuál es el procedimiento para medir la talla en un paciente parapléjico?", o: ["Medición de altura talón-rodilla (ATR) y aplicar fórmula", "Medir longitud de brazos extendidos dividida entre 2", "Medir en decúbito supino con cinta de vertex a talón", "Preguntar al paciente su talla referida sin ajustes"], a: 0 },
        { q: "9. Si la línea de equilibrio de una balanza mecánica se desplaza hacia abajo sin carga, ¿como se regula?", o: ["Girar tornillo de calibración a la derecha (sentido horario)", "Girar tornillo de calibración a la izquierda", "Agregar una pesa adicional en el platillo", "Retirar la balanza y pedir soporte técnico inmediato"], a: 0 },
        { q: "10. ¿Qué descripción corresponde al patrón respiratorio de Kussmaul?", o: ["Respiraciones profundas, rápidas y regulares, sin pausas", "Ciclos con incremento y decremento con apneas", "Respiraciones irregulares con apneas prolongadas", "Inspiraciones prolongadas con espiración en dos tiempos"], a: 0 },
        { q: "11. ¿Cuáles son los signos vitales normales para recién nacido, escolar y adulto?", o: ["RN: FC 120-160, FR 40-60; Escolar: FC 70-110, FR 18-30; Adulto: FC 60-100, FR 12-20", "RN: FC 80-100, FR 20-30; Escolar: FC 100-130, FR 30-40; Adulto: FC 50-70, FR 10-14", "RN: FC 140-180, FR 50-70; Escolar: FC 60-80, FR 14-18; Adulto: FC 70-90, FR 16-24", "RN: FC 100-120, FR 30-40; Escolar: FC 80-100, FR 20-25; Adulto: FC 55-85, FR 14-18"], a: 0 },
        { q: "12. Paciente con dolor agudo en fosa ilíaca derecha, fiebre y abdomen rígido. ¿Prioridad de enfermería?", o: ["Aplicar triage, clasificar, monitorizar, canalizar vía y preparar valoración médica", "Administrar analgésico opiáceo de inmediato", "Colocar en posición Fowler y aplicar calor local", "Realizar enema evacuante y administrar antiemético"], a: 0 },
        { q: "13. Paciente abre ojos al llamado, emite palabras incomprensibles y mueve solo dedos al ordenar. ¿Escala de Glasgow?", o: ["AO: 3 / RV: 2 / RM: 5 — Total: 10 puntos", "AO: 4 / RV: 3 / RM: 6 — Total: 13 puntos", "AO: 2 / RV: 2 / RM: 4 — Total: 8 puntos", "AO: 3 / RV: 3 / RM: 4 — Total: 10 puntos"], a: 0 },
        { q: "14. Paciente con EPOC satura 82% con cánula a 4 L/min. Meta: 88-90%. ¿Procedimiento correcto?", o: ["Cambiar a mascarilla Venturi al 28-35% de FiO2", "Aumentar flujo de cánula nasal de 4 a 10 L/min", "Colocar mascarilla de reinhalación con reservorio a 15 L/min", "Suspender el oxígeno temporalmente para estimular drive"], a: 0 },
        { q: "15. En la planeación se establecen resultados y los indicadores usando la taxonomía NOC", o: ["Resultados — indicadores", "Evaluaciones — resultados", "Intervenciones — resultados", "Ejecuciones — dominios"], a: 0 },
        { q: "16. ¿Qué son las características definitorias en un diagnóstico de enfermería NANDA?", o: ["Las manifestaciones clínicas observables y referidas (signos y síntomas)", "Las causas o condiciones que contribuyen al problema de salud", "Los criterios de resultado esperados que la enfermera plantea", "Los antecedentes patológicos que predisponen al desarrollo"], a: 0 },
        { q: "17. ¿Cuál es la estructura correcta para la redacción de los diagnósticos focalizados en el problema?", o: ["Etiqueta + factores relacionados + características definitorias", "Etiqueta + evidenciado por + características definitorias", "Etiqueta + factores de riesgo", "Etiqueta + factores de riesgo + características definitorias"], a: 0 },
        { q: "18. ¿Cuáles son los elementos estructurales que componen una intervención de la taxonomía NIC?", o: ["Etiqueta, definición, lista de actividades y referencias bibliográficas", "Etiqueta diagnóstica, criterios de resultado, escala Likert y NOC", "Nombre del diagnóstico, factores de riesgo y puntuación diana", "Etiqueta NIC, características definitorias y campo de intervención"], a: 0 },
        { q: "19. ¿Cuál de las siguientes opciones describe correctamente cada una de las partes de la estructura PES?", o: ["P: problema; E: etiología/factor relacionado; S: signos y síntomas", "P: patología médica; E: evaluación NOC; S: síntesis del plan", "P: plan de objetivos; E: ejecución NIC; S: seguimiento", "P: proceso del PAE; E: enfermería; S: salud del paciente"], a: 0 },
        { q: "20. ¿Qué procedimientos sistemáticos se realizan durante la primera etapa (Valoración) del PAE?", o: ["Recolección de datos, validación, organización y documentación", "Formulación de diagnósticos, priorización y selección de NIC", "Elaboración del plan, aplicación de cuidados y delegación", "Evaluación de resultados NOC y comparación con la puntuación diana"], a: 0 },
        { q: "21. Gestante refiere pérdida involuntaria de orina al toser o estornudar. Suelo pélvico disminuido. ¿NANDA prioritario?", o: ["Incontinencia urinaria de esfuerzo", "Retención urinaria", "Deterioro de la eliminación urinaria", "Ansiedad relacionada con cambios corporales"], a: 0 },
        { q: "22. Paciente con traumatismo maxilofacial presenta obstrucción de vía aérea por cuerpo extraño y cianosis. ¿NANDA prioritario?", o: ["Limpieza ineficaz de la vía aérea", "Deterioro del intercambio gaseoso", "Patrón respiratorio ineficaz", "Riesgo de asfixia"], a: 0 },
        { q: "23. Paciente politraumatizado con PO2 40 mmHg (hipoxemia) y PaCO2 50 mmHg (hipercapnia). ¿NANDA prioritario?", o: ["Deterioro del intercambio de gases", "Limpieza ineficaz de la vía aérea", "Patrón respiratorio ineficaz", "Riesgo de perfusión tisular cerebral ineficaz"], a: 0 },
        { q: "24. Paciente con eritema perioral, exantema, vesículas y pústulas de 4 días de evolución. ¿NANDA prioritario?", o: ["Deterioro de la integridad cutánea", "Riesgo de infección", "Dolor agudo por hiperestesia", "Ansiedad relacionada con cuadro dermatológico"], a: 0 },
